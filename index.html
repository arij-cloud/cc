<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Club Application Form</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(120deg, #c0a0ff, #a0d8ff);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        form {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            width: 400px;
        }

        h2 {
            text-align: center;
            color: #5a00d4;
            margin-bottom: 25px;
            font-family: 'Verdana', sans-serif;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #4b0082;
        }

        input, textarea, select {
            width: 100%;
            margin-top: 5px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #aaa;
            box-sizing: border-box;
            font-size: 14px;
        }

        input[type="radio"] {
            width: auto;
            margin-right: 5px;
        }

        .section {
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #6a0dad, #00bfff);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        #which_club_section {
            display: none; /* hidden by default */
        }
    </style>
</head>
<body>

    <form action="https://formspree.io/f/maqljjlv" method="POST" id="clubForm">
        <h2>Club Application Form</h2>

        <div class="section">
            <label>Name:</label>
            <input type="text" name="name" id="name" required>
        </div>
        </div>
           <div class="section">
            <label>email:</label>
            <input type="email" name="mail" id="mail" required>
        </div>
           <div class="section">
            <label>numero :</label>
            <input type="number" name="num" id="num" required>
        </div>


        <div class="section">
            <label>Talk about yourself:</label>
            <textarea name="about" id="about" rows="4" placeholder="Write a few lines about the person ..." required></textarea>
        </div>

        <div class="section">
            <label>What do you want to learn?</label>
            <textarea name="learn" id="learn" rows="5" required></textarea>
        </div>

        <!-- New Question: Where did you hear about our club? -->
        <div class="section">
            <label>Where did you hear about our club?</label>
            <input type="text" name="hear_about" id="hear_about" placeholder="e.g., social media, friend, poster" required>
        </div>

        <div class="section">
            <label>Have you been part of the club before?</label>
            <input type="radio" name="club_previous" id="club_yes" value="yes" required> Yes
            <input type="radio" name="club_previous" id="club_no" value="no" required> No
        </div>

        <div class="section" id="which_club_section">
            <label>Which club?</label>
            <input type="text" name="which_club" id="which_club" placeholder="Name of the previous club">
        </div>

        <div class="section">
            <label>Which department interests you the most?</label>
            <select name="department" id="department" required>
                <option value="hr">HR</option>
                <option value="marketing">Media</option>
                <option value="sponsoring">Sponsoring</option>
                <option value="management">Management</option>
            </select>
        </div>

        <div class="section">
            <label>How much time can you dedicate to the club?</label>
            <input type="text" name="time_commitment" id="time_commitment" required>
        </div>

        <button type="submit">Submit</button>
    </form>

    <script>
        // Show/hide "Which club?" based on previous selection
        const yesRadio = document.getElementById('club_yes');
        const noRadio = document.getElementById('club_no');
        const whichClubSection = document.getElementById('which_club_section');

        yesRadio.addEventListener('change', () => {
            if (yesRadio.checked) {
                whichClubSection.style.display = 'block';
            }
        });

        noRadio.addEventListener('change', () => {
            if (noRadio.checked) {
                whichClubSection.style.display = 'none';
            }
        });
    </script>

</body>
</html>
